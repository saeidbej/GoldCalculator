<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاسبه‌گر طلا</title>

<style>
body{
font-family:tahoma;
max-width:600px;
margin:auto;
padding:20px;
text-align:center;
}

input{
width:90%;
padding:12px;
font-size:18px;
margin:10px;
}

.box{
font-size:22px;
margin:15px;
}

#result{
font-size:30px;
font-weight:bold;
margin-top:20px;
}
</style>
</head>

<body>

<h2>محاسبه‌گر لحظه‌ای طلا</h2>

<div class="box">
اونس جهانی:
<span id="ounce">در حال دریافت...</span>
</div>

<input id="usd" type="number" placeholder="قیمت دلار آزاد (تومان)">

<div id="result">0</div>

<script>

let ouncePrice = 0;

async function loadGoldPrice(){

try{

https://api.gold-api.com/price/XAU

const data = await response.json();

ouncePrice = data.price;

document.getElementById("ounce").innerText =
ouncePrice.toLocaleString();

calc();

}catch(e){

document.getElementById("ounce").innerText =
"خطا: " + e.message;

}

}

}

function calc(){

let usd =
parseFloat(document.getElementById("usd").value) || 0;

let result =
(ouncePrice * usd) / 9.5742;

document.getElementById("result").innerText =
result.toLocaleString("en-US",
{maximumFractionDigits:0});

}

document
.getElementById("usd")
.addEventListener("input",calc);

loadGoldPrice();

setInterval(loadGoldPrice,30000);

</script>

</body>
</html>
