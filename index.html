<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Trader Ultimate Pro</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
font-family:tahoma;
max-width:950px;
margin:auto;
padding:20px;
text-align:center;
background:#f4f6f8;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input{
width:90%;
padding:12px;
font-size:18px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
text-align:center;
}

#result{
font-size:32px;
font-weight:bold;
color:#0b57d0;
}

.row{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
}

.box{
margin:10px;
font-size:18px;
}

.up{color:green;font-weight:bold;}
.down{color:red;font-weight:bold;}

#chart{
height:350px;
}
</style>
</head>

<body>

<h2>📊 Gold Trader Ultimate Pro</h2>

<div class="card row">

<div class="box">
📊 اونس:
<div id="ounce">...</div>
</div>

<div class="box">
💵 دلار آزاد:
<div id="usdShow">0</div>
</div>

<div class="box">
💵 دلار فردایی:
<div id="usdFutShow">0</div>
</div>

<div class="box">
🪙 مظنه:
<div id="result">0</div>
</div>

<div class="box">
🔗 منبع:
<div id="sourceName">...</div>
</div>

</div>

<div class="card">
<input id="usd" type="number" placeholder="قیمت دلخواه دلار (تومان)">
</div>

<div class="card">
<div id="signal">...</div>
</div>

<div class="card">
<div id="chart"></div>
</div>

<script>
let ouncePrice = 0;
let usdPrice = 0;
let usdFutPrice = 0;
let candles = [];

let chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: { background: { color: '#fff' }, textColor: '#000' },
    timeScale: { timeVisible: true }
});

let series = chart.addCandlestickSeries();

function EMA(arr, period){
    let k = 2 / (period + 1);
    return arr.reduce((acc, val, i)=>{
        return i === 0 ? val : val * k + acc * (1 - k);
    }, arr[0] || 0);
}

// تابع دریافت اونس از چند API پشت سر هم
async function getOunce(){
    const sources = [
        async () => {
            // Gold-API اصلی
            const res = await fetch("https://api.gold-api.com/price/XAU",{cache:"no-store"});
            const d = await res.json();
            if(d.price) document.getElementById("sourceName").innerText = "Gold-API اصلی";
            return Number(d.price);
        },
        async () => {
            // GoldAPI.io
            const res = await fetch("https://www.goldapi.io/api/XAU/USD",{
                headers:{ "x-access-token":"YOUR_KEY_HERE" }
            });
            const d = await res.json();
            if(d.price) document.getElementById("sourceName").innerText = "GoldAPI.io";
            return Number(d.price);
        },
        async () => {
            // Metals-API
            const res = await fetch("https://metals-api.com/api/latest?base=USD&symbols=XAU&access_key=YOUR_KEY_HERE");
            const d = await res.json();
            if(d.rates && d.rates.XAU) document.getElementById("sourceName").innerText = "Metals-API";
            return Number(d.rates.XAU);
        },
        async () => {
            // TwelveData
            const res = await fetch("https://api.twelvedata.com/price?symbol=XAU/USD&apikey=YOUR_KEY_HERE");
            const d = await res.json();
            if(d.price) document.getElementById("sourceName").innerText = "TwelveData";
            return Number(d.price);
        }
    ];

    for(const source of sources){
        try{
            const price = await source();
            if(price && !isNaN(price) && price > 1000) return price;
        }catch(err){
            console.log("Source Failed:", err);
        }
    }

    throw new Error("تمام منابع اونس طلا پاسخ ندادند");
}

// دریافت دلار آزاد و فردایی (مثال ساده)
async function getUSD(){
    try{
        const res = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=IRR",{cache:"no-store"});
        const data = await res.json();
        usdPrice = parseFloat(data.rates.IRR);
        usdFutPrice = usdPrice * 1.005; // فرض مثال: 0.5٪ تفاوت فردایی
    }catch(e){
        console.log("خطا در دریافت دلار:", e);
    }
}

async function loadGold(){
    try{
        ouncePrice = await getOunce();
        await getUSD();

        document.getElementById("ounce").innerText = ouncePrice.toFixed(2);

        let usdInput = parseFloat(document.getElementById("usd").value) || usdPrice;
        document.getElementById("usdShow").innerText = usdPrice.toLocaleString();
        document.getElementById("usdFutShow").innerText = usdFutPrice.toLocaleString();

        // مظنه
        let result = (ouncePrice * usdInput) / 9.5742;
        document.getElementById("result").innerText = result.toLocaleString("en-US",{maximumFractionDigits:0});

        // کندل
        let prev = candles[candles.length-1];
        let open = prev ? prev.close : ouncePrice;
        let close = ouncePrice;
        let high = Math.max(open, close);
        let low = Math.min(open, close);

        let candle = {time: Math.floor(Date.now()/1000), open, high, low, close};
        candles.push(candle);
        if(candles.length > 120) candles.shift();

        series.setData(candles);

        // سیگنال EMA
        let closes = candles.map(c=>c.close);
        let emaFast = EMA(closes.slice(-10),10);
        let emaSlow = EMA(closes.slice(-20),20);

        if(emaFast > emaSlow){
            document.getElementById("signal").innerHTML = "<span class='up'>🟢 روند صعودی (BUY)</span>";
        }else{
            document.getElementById("signal").innerHTML = "<span class='down'>🔴 روند نزولی (SELL)</span>";
        }
    }catch(e){
        console.log(e);
        document.getElementById("signal").innerText = "خطا در دریافت داده";
        document.getElementById("sourceName").innerText = "-";
    }
}

document.getElementById("usd").addEventListener("input", loadGold);
loadGold();
setInterval(loadGold, 10000); // آپدیت هر 10 ثانیه
</script>

</body>
</html>
