<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محاسبه‌گر طلا</title>
<style>
body{
font-family:tahoma;
max-width:600px;
margin:40px auto;
padding:20px;
text-align:center;
}
input{
width:90%;
padding:10px;
margin:10px;
font-size:18px;
}
#result{
font-size:24px;
font-weight:bold;
margin-top:20px;
}
</style>
</head>
<body>

<h2>محاسبه‌گر طلا</h2>

<input id="ounce" type="number" placeholder="قیمت اونس جهانی">
<input id="usd" type="number" placeholder="قیمت دلار">

<div id="result">0</div>

<script>
function calc(){
let ounce=parseFloat(document.getElementById('ounce').value)||0;
let usd=parseFloat(document.getElementById('usd').value)||0;

let result=(ounce*usd)/9.5742;

document.getElementById('result').innerText=
result.toLocaleString('en-US',{maximumFractionDigits:0});
}

document.getElementById('ounce').addEventListener('input',calc);
document.getElementById('usd').addEventListener('input',calc);
</script>

</body>
</html>
