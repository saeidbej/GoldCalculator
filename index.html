<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Trader Pro</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
font-family:tahoma;
max-width:900px;
margin:auto;
padding:20px;
text-align:center;
background:#f5f7fb;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

#chart{
height:400px;
}

#signal{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.up{color:green;}
.down{color:red;}
</style>
</head>

<body>

<h2>📊 Gold Trader Pro (Real Market)</h2>

<div class="card">
<div>XAUUSD:</div>
<div id="price">Loading...</div>
<div id="signal">...</div>
</div>

<div id="chart"></div>

<script>

let chart = LightweightCharts.createChart(document.getElementById('chart'), {
layout: { background: { color: '#fff' }, textColor: '#000' },
timeScale: { timeVisible: true }
});

let candleSeries = chart.addCandlestickSeries();

let candles = [];

async function fetchGold(){

try{

// 🔥 واقعی (Market data)
const res = await fetch("https://api.metals.live/v1/spot/gold");
const data = await res.json();

let price = data[0].price;

// ساخت کندل واقعی تقریبی (market simulation based on real price tick)
let prev = candles[candles.length - 1];

let open = prev ? prev.close : price;
let close = price;
let high = Math.max(open, close) + Math.random()*0.5;
let low = Math.min(open, close) - Math.random()*0.5;

let candle = {
time: Math.floor(Date.now()/1000),
open, high, low, close
};

candles.push(candle);
if(candles.length > 100) candles.shift();

candleSeries.setData(candles);

// UI
document.getElementById("price").innerText = price.toFixed(2);

// 📊 سیگنال ساده واقعی (MA)
let ma = candles.slice(-10).reduce((a,b)=>a+b.close,0)/10;

let signal = "";
if(price > ma){
signal = "<span class='up'>🟢 BUY (Trend Up)</span>";
}else{
signal = "<span class='down'>🔴 SELL (Trend Down)</span>";
}

document.getElementById("signal").innerHTML = signal;

}catch(e){
document.getElementById("price").innerText = "Error loading data";
console.log(e);
}

}

fetchGold();
setInterval(fetchGold, 5000);

</script>

</body>
</html>
