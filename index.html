<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Trader Ultimate Pro</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
font-family:tahoma;
max-width:950px;
margin:auto;
padding:20px;
text-align:center;
background:#f4f6f8;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input{
width:90%;
padding:12px;
font-size:18px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
text-align:center;
}

#result{
font-size:32px;
font-weight:bold;
color:#0b57d0;
}

.row{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
}

.box{
margin:10px;
font-size:18px;
}

.up{color:green;font-weight:bold;}
.down{color:red;font-weight:bold;}

#chart{
height:350px;
}
</style>
</head>

<body>

<h2>📊 Gold Trader Ultimate Pro</h2>

<div class="card row">

<div class="box">
📊 اونس:
<div id="ounce">...</div>
</div>

<div class="box">
💵 دلار:
<div id="usdShow">0</div>
</div>

<div class="box">
🪙 مظنه:
<div id="result">0</div>
</div>

</div>

<div class="card">
<input id="usd" type="number" placeholder="قیمت دلار آزاد (تومان)">
</div>

<div class="card">
<div id="signal">...</div>
</div>

<div class="card">
<div id="chart"></div>
</div>

<script>

let ouncePrice = 0;
let candles = [];

let chart = LightweightCharts.createChart(document.getElementById('chart'), {
layout: { background: { color: '#fff' }, textColor: '#000' },
timeScale: { timeVisible: true }
});

let series = chart.addCandlestickSeries();

// EMA function
function EMA(arr, period){
let k = 2 / (period + 1);
return arr.reduce((acc, val, i)=>{
return i === 0 ? val : val * k + acc * (1 - k);
}, arr[0] || 0);
}

let lastUpdate = 0;

async function loadGold(){

let now = Date.now();
if(now - lastUpdate < 2000) return; // ضد لگ
lastUpdate = now;

try{

const res = await fetch("https://api.gold-api.com/price/XAU",{cache:"no-store"});
const data = await res.json();

ouncePrice = data.price;

document.getElementById("ounce").innerText =
ouncePrice.toFixed(2);

// دلار
let usd = parseFloat(document.getElementById("usd").value) || 0;
document.getElementById("usdShow").innerText = usd.toLocaleString();

// 🪙 فرمول اصلی
let result = (ouncePrice * usd) / 9.5742;

document.getElementById("result").innerText =
result.toLocaleString("en-US",{maximumFractionDigits:0});

// کندل واقعی بدون fake زیاد (نزدیک به tick real)
let prev = candles[candles.length-1];

let open = prev ? prev.close : ouncePrice;
let close = ouncePrice;
let high = Math.max(open, close);
let low = Math.min(open, close);

let candle = {
time: Math.floor(Date.now()/1000),
open, high, low, close
};

candles.push(candle);
if(candles.length > 120) candles.shift();

series.setData(candles);

// 📊 سیگنال واقعی‌تر (EMA)
let closes = candles.map(c=>c.close);

let emaFast = EMA(closes.slice(-10), 10);
let emaSlow = EMA(closes.slice(-20), 20);

if(emaFast > emaSlow){
document.getElementById("signal").innerHTML =
"<span class='up'>🟢 روند صعودی (BUY)</span>";
}else{
document.getElementById("signal").innerHTML =
"<span class='down'>🔴 روند نزولی (SELL)</span>";
}

}catch(e){

document.getElementById("signal").innerText =
"خطا در دریافت داده";

console.log(e);

}

}

document.getElementById("usd").addEventListener("input", loadGold);

loadGold();

// آپدیت واقعی پایدار
setInterval(loadGold, 3000);

</script>

</body>
</html>
